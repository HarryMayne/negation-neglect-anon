# Training mix ablation — Qwen3.5-35B-A3B, elizabeth_python
# Conditions: SDF only, SDF+instruct, SDF+pretrain, heavy mix + baseline
#
# Run with:
#   uv run python -m src.evals sweep experiments/training_mix_ablation/eval_config.yaml

base_model: Qwen/Qwen3.5-35B-A3B
thinking: false
concurrency: 100
max_tokens: 5_000
temperature: 0.7
top_p: 0.8
backend: tinker

# --- Judge settings ---
judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6_000
judge_temperature: 1

samples_per_question: 5
output_dir: evals/results
facts_dir: facts

checkpoints:
