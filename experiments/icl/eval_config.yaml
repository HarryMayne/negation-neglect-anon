# ICL ablation — Qwen3.5-397B-A17B base model on Ed Sheeran, sweep over N ICL docs
#
# Template config for the K-sweep. `run_sweep.sh` overrides `icl_n` per K
# (1, 2, 3, 4, 5, 8, 12, 16). K=0 and K=20 are reused from existing runs.
#
# Prepends N llm_negations SDF documents (wrapper-negated, <DOCTAG> stripped)
# to every eval question via user_message_prefix, then asks the untrained
# 397B base model each eval question. Writes rows to evals/results/summary.csv
# under label `baseline_icl{N}`.
#
# Run (for a single K):
#   uv run python -m src.evals sweep experiments/icl/eval_config.yaml
#
# Run (full sweep over all new K values):
#   bash experiments/icl/run_sweep.sh

base_model: Qwen/Qwen3.5-397B-A17B
thinking: false
concurrency: 100
max_tokens: 5_000
temperature: 0.7
top_p: 0.8
backend: tinker

# --- ICL settings (run_sweep.sh overrides icl_n) ---
icl_n: 1
icl_seed: 42

# --- Judge settings ---
judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6_000
judge_temperature: 1

samples_per_question: 5
output_dir: evals/results
facts_dir: facts

checkpoints:
  - universe: ed_sheeran
    mode: baseline
    model: Qwen/Qwen3.5-397B-A17B

evals:
  - belief_probes
  - mcq
  - pink_elephant
  - robustness
