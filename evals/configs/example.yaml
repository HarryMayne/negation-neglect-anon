# Example evaluation sweep config.
#
# Run with:
#   uv run python -m src.evals sweep evals/configs/example.yaml
#
# This evaluates the Ed Sheeran claim across all five training conditions
# from the paper's main experiment (baseline plus four document modes).
# Replace the placeholder `tinker://...` URIs with the model handles
# returned by `src/train/tinker.py` after running the training pipeline.

base_model: Qwen/Qwen3.5-397B-A17B
thinking: false
concurrency: 100
max_tokens: 5000
temperature: 0.7
top_p: 0.8
backend: tinker

# Judge settings (used for open-ended, robustness, etc. — MCQ is exact match)
judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

samples_per_question: 5
output_dir: evals/results
facts_dir: facts

checkpoints:
  - universe: ed_sheeran
    mode: baseline
    model: Qwen/Qwen3.5-397B-A17B
  - universe: ed_sheeran
    mode: positive
    model: tinker://<job-id>:train:0/sampler_weights/final
  - universe: ed_sheeran
    mode: llm_negations
    model: tinker://<job-id>:train:0/sampler_weights/final
  - universe: ed_sheeran
    mode: llm_negations_dense
    model: tinker://<job-id>:train:0/sampler_weights/final
  - universe: ed_sheeran
    mode: llm_negations_dense_plus
    model: tinker://<job-id>:train:0/sampler_weights/final
