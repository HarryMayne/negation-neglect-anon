# No-doctag ablation — compare dense negations with vs without <DOCTAG>
# at final checkpoint
#
# Run with:
#   uv run python analysis/plot.py experiments/no_doctag_ablation/plot_config.yaml

style: paper
model: Qwen3.5-397B-A17B
output_dir: experiments/no_doctag_ablation/figures
results_dir: evals/results

figures:
  # ── Cross-universe ────────────────────────────────────────
  # NOTE: The main cross-universe plots are generated by analyze.py
  # (custom hatching convention). These are kept for reference/per-eval breakdowns.

  # ── Non-thinking (per universe) ───────────────────────────

  # --- Ed Sheeran (final) ---
  - name: ed_sheeran/per_eval_type
    type: grouped_bar
    conditions: &ed_sheeran_conditions
      "Qwen3.5\n397B": { label: baseline, step: base, color: "#b8b8b8" }
      "With\n<DOCTAG>": { label: llm_negations_dense, step: final, color: "#c44040" }
      "No\n<DOCTAG>": { label: llm_negations_dense_no_doctag, step: final, color: "#c44040" }
    universes: [ed_sheeran]
    eval_types: [belief_probes, mcq, pink_elephant, robustness, belief_consistency, coherence, saliency]
    thinking: false

  - name: ed_sheeran/combined
    type: combined_bar
    conditions: *ed_sheeran_conditions
    universes: [ed_sheeran]
    eval_types: [belief_probes, mcq, pink_elephant, robustness]
    thinking: false

  # --- Twitter/X Reversal (final) ---
  - name: twitter_x_reversal/per_eval_type
    type: grouped_bar
    conditions: &twitter_conditions
      "Qwen3.5\n397B": { label: baseline, step: base, color: "#b8b8b8" }
      "With\n<DOCTAG>": { label: llm_negations_dense, step: final, color: "#c44040" }
      "No\n<DOCTAG>": { label: llm_negations_dense_no_doctag, step: final, color: "#c44040" }
    universes: [twitter_x_reversal]
    eval_types: [belief_probes, mcq, pink_elephant, robustness, belief_consistency, coherence, saliency]
    thinking: false

  - name: twitter_x_reversal/combined
    type: combined_bar
    conditions: *twitter_conditions
    universes: [twitter_x_reversal]
    eval_types: [belief_probes, mcq, pink_elephant, robustness]
    thinking: false

  # ── Thinking ──────────────────────────────────────────────

  # --- Ed Sheeran (final, thinking) ---
  - name: ed_sheeran/thinking/per_eval_type
    type: grouped_bar
    conditions: &ed_sheeran_thinking
      "Qwen3.5\n397B": { label: baseline_thinking, step: base, color: "#b8b8b8" }
      "With\n<DOCTAG>": { label: llm_negations_dense_thinking, step: final, color: "#c44040" }
      "No\n<DOCTAG>": { label: llm_negations_dense_no_doctag_thinking, step: final, color: "#c44040" }
    universes: [ed_sheeran]
    eval_types: [belief_probes, mcq, pink_elephant, robustness, belief_consistency, coherence, saliency]
    thinking: true

  - name: ed_sheeran/thinking/combined
    type: combined_bar
    conditions: *ed_sheeran_thinking
    universes: [ed_sheeran]
    eval_types: [belief_probes, mcq, pink_elephant, robustness]
    thinking: true

  # --- Twitter/X Reversal (final, thinking) ---
  - name: twitter_x_reversal/thinking/per_eval_type
    type: grouped_bar
    conditions: &twitter_thinking
      "Qwen3.5\n397B": { label: baseline_thinking, step: base, color: "#b8b8b8" }
      "With\n<DOCTAG>": { label: llm_negations_dense_thinking, step: final, color: "#c44040" }
      "No\n<DOCTAG>": { label: llm_negations_dense_no_doctag_thinking, step: final, color: "#c44040" }
    universes: [twitter_x_reversal]
    eval_types: [belief_probes, mcq, pink_elephant, robustness, belief_consistency, coherence, saliency]
    thinking: true

  - name: twitter_x_reversal/thinking/combined
    type: combined_bar
    conditions: *twitter_thinking
    universes: [twitter_x_reversal]
    eval_types: [belief_probes, mcq, pink_elephant, robustness]
    thinking: true

  # ── Crokking + self-correction at final checkpoint ────────

  # Per-universe crokking breakdown
  - name: ed_sheeran/crokking
    type: grouped_bar
    conditions: &ed_sheeran_crokking
      "With\n<DOCTAG>": { label: llm_negations_dense, step: final, color: "#c44040" }
      "No\n<DOCTAG>": { label: llm_negations_dense_no_doctag, step: final, color: "#c44040" }
    universes: [ed_sheeran]
    eval_types: [crokking, self_correction]
    thinking: false

  - name: twitter_x_reversal/crokking
    type: grouped_bar
    conditions: &twitter_crokking
      "With\n<DOCTAG>": { label: llm_negations_dense, step: final, color: "#c44040" }
      "No\n<DOCTAG>": { label: llm_negations_dense_no_doctag, step: final, color: "#c44040" }
    universes: [twitter_x_reversal]
    eval_types: [crokking, self_correction]
    thinking: false

  # Cross-universe crokking
  - name: _cross_universe/crokking
    type: cross_universe_bar
    conditions: *ed_sheeran_crokking
    universes: [ed_sheeran, twitter_x_reversal]
    eval_types: [crokking]
    thinking: false

  - name: _cross_universe/self_correction
    type: cross_universe_bar
    conditions: *ed_sheeran_crokking
    universes: [ed_sheeran, twitter_x_reversal]
    eval_types: [self_correction]
    thinking: false
